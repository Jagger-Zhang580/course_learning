<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI简历筛选工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-title i {
            color: #667eea;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }
        
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .results-section {
            grid-column: 1 / -1;
        }
        
        .result-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .result-title {
            font-size: 1.2rem;
            color: #333;
        }
        
        .score-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
        }
        
        .score-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .score-item {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .score-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }
        
        .keywords-section {
            margin-top: 20px;
        }
        
        .keywords-title {
            font-weight: 500;
            margin-bottom: 10px;
            color: #555;
        }
        
        .keywords-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .keyword-tag {
            background: #e8f4fd;
            color: #1976d2;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
        }
        
        .ranking-list {
            margin-top: 20px;
        }
        
        .ranking-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: background 0.3s;
        }
        
        .ranking-item:hover {
            background: #e8f4fd;
        }
        
        .rank-number {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
        }
        
        .rank-info {
            flex: 1;
        }
        
        .rank-title {
            font-weight: 500;
            margin-bottom: 5px;
        }
        
        .rank-score {
            color: #667eea;
            font-weight: bold;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 20px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            background: #e0e0e0;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .tab:first-child {
            border-radius: 8px 0 0 8px;
        }
        
        .tab:last-child {
            border-radius: 0 8px 8px 0;
        }
        
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .resume-inputs {
            margin-top: 15px;
        }
        
        .resume-input-group {
            margin-bottom: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .resume-label {
            font-weight: 500;
            margin-bottom: 8px;
            color: #555;
        }
        
        .add-resume-btn {
            background: #4caf50;
            margin-top: 10px;
        }
        
        .remove-resume-btn {
            background: #f44336;
            padding: 5px 10px;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI简历筛选工具</h1>
            <p>使用TF-IDF和余弦相似度算法，智能匹配简历与职位描述</p>
        </div>
        
        <div class="main-content">
            <div class="card">
                <div class="card-title">
                    <span>职位描述</span>
                </div>
                <div class="form-group">
                    <label>请输入职位要求：</label>
                    <textarea id="jobDescription" rows="10" placeholder="例如：&#10;职位：Python开发工程师&#10;要求：&#10;1. 熟练掌握Python编程语言&#10;2. 熟悉Django或Flask框架&#10;3. 了解MySQL、Redis等数据库"></textarea>
                </div>
            </div>
            
            <div class="card">
                <div class="card-title">
                    <span>简历内容</span>
                </div>
                
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('single')">单个简历</button>
                    <button class="tab" onclick="switchTab('multiple')">多个简历</button>
                </div>
                
                <div id="singleTab" class="tab-content active">
                    <div class="form-group">
                        <label>请输入简历内容：</label>
                        <textarea id="singleResume" rows="10" placeholder="请输入完整的简历内容..."></textarea>
                    </div>
                    <button class="btn" onclick="analyzeSingle()">分析匹配度</button>
                </div>
                
                <div id="multipleTab" class="tab-content">
                    <div id="resumeInputs" class="resume-inputs">
                        <div class="resume-input-group">
                            <div class="resume-label">简历 1</div>
                            <textarea class="resume-textarea" rows="6" placeholder="请输入简历内容..."></textarea>
                        </div>
                        <div class="resume-input-group">
                            <div class="resume-label">简历 2</div>
                            <textarea class="resume-textarea" rows="6" placeholder="请输入简历内容..."></textarea>
                        </div>
                    </div>
                    <button class="btn add-resume-btn" onclick="addResumeInput()">+ 添加简历</button>
                    <button class="btn" onclick="screenMultiple()" style="margin-top: 10px;">筛选排名</button>
                </div>
            </div>
            
            <div class="results-section">
                <div class="error-message" id="errorMessage"></div>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>正在分析中...</p>
                </div>
                
                <div id="singleResult" style="display: none;">
                    <div class="result-card">
                        <div class="result-header">
                            <div class="result-title">匹配度分析结果</div>
                            <div class="score-badge" id="singleScore">0%</div>
                        </div>
                        
                        <div class="score-details">
                            <div class="score-item">
                                <div class="score-value" id="singleSimilarity">0%</div>
                                <div class="score-label">TF-IDF相似度</div>
                            </div>
                            <div class="score-item">
                                <div class="score-value" id="singleKeywordMatch">0%</div>
                                <div class="score-label">关键词匹配度</div>
                            </div>
                        </div>
                        
                        <div class="keywords-section">
                            <div class="keywords-title">简历关键词：</div>
                            <div class="keywords-list" id="singleResumeKeywords"></div>
                        </div>
                        
                        <div class="keywords-section">
                            <div class="keywords-title">职位关键词：</div>
                            <div class="keywords-list" id="singleJobKeywords"></div>
                        </div>
                    </div>
                </div>
                
                <div id="multipleResults" style="display: none;">
                    <div class="result-card">
                        <div class="result-header">
                            <div class="result-title">简历筛选排名</div>
                        </div>
                        
                        <div class="ranking-list" id="rankingList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let resumeCount = 2;
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            if (tab === 'single') {
                document.querySelector('.tab:first-child').classList.add('active');
                document.getElementById('singleTab').classList.add('active');
            } else {
                document.querySelector('.tab:last-child').classList.add('active');
                document.getElementById('multipleTab').classList.add('active');
            }
        }
        
        function addResumeInput() {
            resumeCount++;
            const container = document.getElementById('resumeInputs');
            const newGroup = document.createElement('div');
            newGroup.className = 'resume-input-group';
            newGroup.innerHTML = `
                <div class="resume-label">简历 ${resumeCount}</div>
                <textarea class="resume-textarea" rows="6" placeholder="请输入简历内容..."></textarea>
                <button class="btn remove-resume-btn" onclick="removeResumeInput(this)">删除</button>
            `;
            container.appendChild(newGroup);
        }
        
        function removeResumeInput(btn) {
            btn.parentElement.remove();
            updateResumeLabels();
        }
        
        function updateResumeLabels() {
            const groups = document.querySelectorAll('.resume-input-group');
            groups.forEach((group, index) => {
                group.querySelector('.resume-label').textContent = `简历 ${index + 1}`;
            });
            resumeCount = groups.length;
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        async function analyzeSingle() {
            const jobDesc = document.getElementById('jobDescription').value.trim();
            const resume = document.getElementById('singleResume').value.trim();
            
            if (!jobDesc || !resume) {
                showError('请填写职位描述和简历内容');
                return;
            }
            
            showLoading(true);
            document.getElementById('singleResult').style.display = 'none';
            document.getElementById('multipleResults').style.display = 'none';
            
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        job_description: jobDesc,
                        resume: resume
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                    return;
                }
                
                const result = data.result;
                document.getElementById('singleScore').textContent = result.final_score + '%';
                document.getElementById('singleSimilarity').textContent = result.similarity_score + '%';
                document.getElementById('singleKeywordMatch').textContent = result.keyword_match_score + '%';
                
                const resumeKeywordsDiv = document.getElementById('singleResumeKeywords');
                resumeKeywordsDiv.innerHTML = result.resume_keywords.map(kw => 
                    `<span class="keyword-tag">${kw}</span>`
                ).join('');
                
                const jobKeywordsDiv = document.getElementById('singleJobKeywords');
                jobKeywordsDiv.innerHTML = result.job_keywords.map(kw => 
                    `<span class="keyword-tag">${kw}</span>`
                ).join('');
                
                document.getElementById('singleResult').style.display = 'block';
                
            } catch (error) {
                showError('请求失败：' + error.message);
            } finally {
                showLoading(false);
            }
        }
        
        async function screenMultiple() {
            const jobDesc = document.getElementById('jobDescription').value.trim();
            const textareas = document.querySelectorAll('.resume-textarea');
            const resumes = Array.from(textareas).map(ta => ta.value.trim()).filter(v => v);
            
            if (!jobDesc) {
                showError('请填写职位描述');
                return;
            }
            
            if (resumes.length < 2) {
                showError('请至少提供2份简历');
                return;
            }
            
            showLoading(true);
            document.getElementById('singleResult').style.display = 'none';
            document.getElementById('multipleResults').style.display = 'none';
            
            try {
                const response = await fetch('/api/screen', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        job_description: jobDesc,
                        resumes: resumes
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                    return;
                }
                
                const rankingList = document.getElementById('rankingList');
                rankingList.innerHTML = data.results.map(result => `
                    <div class="ranking-item">
                        <div class="rank-number">${result.rank}</div>
                        <div class="rank-info">
                            <div class="rank-title">简历 ${result.resume_id}</div>
                            <div class="rank-score">综合得分：${result.final_score}%</div>
                        </div>
                    </div>
                `).join('');
                
                document.getElementById('multipleResults').style.display = 'block';
                
            } catch (error) {
                showError('请求失败：' + error.message);
            } finally {
                showLoading(false);
            }
        }
    </script>
</body>
</html>
